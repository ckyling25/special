<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你適合特殊選才嗎? - 特殊選才適配度模擬測驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            /* 核心修復：強制瀏覽器預留滾動條空間，防止內容長短變化時畫面左右跳動 */
            scrollbar-gutter: stable;
        }
        body {
            margin: 0;
            padding: 0;
            /* 改用 100vh 確保高度固定，避免滾動條出現時影響背景 */
            min-height: 100vh;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: #fdfbf6; 
            display: flex;
            align-items: center; /* 修正原本拼錯的 items-center */
            justify-content: center;
            /* 防止背景因為內容增加而產生位移 */
            overflow-x: hidden;
        }
    
        /* 修正背景縮放與位移 */
        body::before {
            content: "";
            position: fixed; /* 鎖定在視窗，不隨內容滾動 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); 
            /* 使用 fixed 確保圖片比例不會因為容器高度改變而重新計算 */
            background-attachment: fixed; 
            transform: translateZ(0);    /* 強制硬體加速，增加渲染穩定度 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            filter: blur(5px);
            opacity: 0.6;
            z-index: -1;
        }
        
        .main-container {
            background-color: rgba(248, 250, 252, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(248, 250, 252, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            z-index: 10;
            width: 95%; /* 增加寬度彈性 */
            
            /* 1. 修改：將寬度從 48rem 縮小到 40rem，讓框框更緊湊 (約 640px) */
            max-width: 40rem;  
        
            /* 2. 修改：將原本的 padding 2.5rem 改為 0，因為間距現在要由內層 div 控制 */
            padding: 0 !important; 
        
            border-radius: 1.5rem;
            /* 避免跳題時容器高度劇烈閃爍 */
            height: auto;
            min-height: auto;
            margin: 20px;
            transition: min-height 0.3s ease; /* 讓題目長度切換時，框框高度變化較平滑 */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 確保底欄的灰色背景不會超出白框的圓角 */
        }
        .disclaimer-bar {
            background-color: #f8fafc; /* 淺灰色背景 */
            border-top: 1px solid #e2e8f0; /* 上方一條淡淡的分隔線 */
            padding: 0.75rem 1rem; /* 上下左右的內距 */
            text-align: center;
            width: 100%;
        }
        
        .disclaimer-text {
            color: #64748b; /* 中灰色文字 */
            font-size: 0.75rem; /* 小字體 */
            margin: 0;
        }

        /* 保持原本選項框的設定... */
        .option-box {
            border: 2px solid #e2e8f0 !important;
            padding: 1.25rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 0.75rem;
            background-color: white;
            text-align: left;
            display: block;
            width: 100%;
        }
        .option-box:hover { border-color: #6366f1 !important; background-color: #f5f3ff; }
        .option-box.selected { border-color: #4f46e5 !important; background-color: #e0e7ff !important; box-shadow: 0 0 0 1px #4f46e5; }
        
        /* 圓形進度條容器 */
        .circle-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem; /* 置中並與下方保持距離 */
        }
        
        /* SVG 圓圈基礎 */
        .circle-svg {
            transform: rotate(-90deg); /* 讓起點從 12 點鐘方向開始 */
        }
        
        .circle-bg {
            fill: none;
            stroke: #e2e8f0; /* 未填充的灰色 */
            stroke-width: 8;
        }
        
        .circle-progress {
            fill: none;
            stroke: #4f46e5; /* 進度條紫色 */
            stroke-width: 8;
            stroke-linecap: round; /* 圓角結尾 */
            stroke-dasharray: 565.48; /* 圓周長 (2 * π * 90) */
            stroke-dashoffset: 565.48; /* 初始偏移（隱藏） */
            transition: stroke-dashoffset 1.5s ease-out; /* 動畫效果 */
        }
        
        /* 圓圈中央的文字區塊 */
        .circle-text-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        #final-score-text {
            display: block;
            font-size: 3.5rem;
            font-weight: 800;
            color: #4f46e5;
            line-height: 1;
        }
        
        .score-label {
            display: block;
            font-size: 1rem;
            color: #64748b;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl main-container">
        
        <div style="padding: 2.5rem 2rem; flex-grow: 1;">
            
            <div id="start-screen" class="center-content">
                <h1 class="text-center text-indigo-900 mb-2 font-bold" style="font-family: 'Noto Sans TC', sans-serif;">
                    <span class="text-3xl md:text-5xl block mb-2">你適合特殊選才嗎?</span>
                    <span class="text-lg md:text-2xl block opacity-80 font-normal">特殊選才適配度模擬測驗</span>
                </h1>

                <p class="text-gray-600 mt-8 mb-10 text-center max-w-2xl mx-auto leading-9">
                    相較於繁星、個人申請及分科測驗，特殊選才不看學測，<br>
                    適合具有「偏才、奇才、逆境向上」特質學生所申請的管道。<br>
                    透過本模擬器，評估你目前的狀態是否適合嘗試這項入學管道。
                </p>
        
                <button onclick="startQuiz()" class="w-full max-w-sm bg-indigo-600 text-white 
                    py-4 rounded-lg font-bold text-xl hover:bg-indigo-700 transition-colors mx-auto block">
                    開始測驗!
                </button>
            </div>

            <div id="quiz-container" class="hidden">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span id="step-indicator" class="text-sm font-medium text-blue-600">題目 1 / 10</span>
                        <span id="percent-indicator" class="text-sm font-medium text-gray-400">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill" style="width: 10%;"></div>
                    </div>
                </div>

                <div id="question-area">
                    </div>

                <div class="mt-8 flex justify-between gap-4">
                    <button id="prev-btn" onclick="goBack()" class="px-6 py-2 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hidden">回上一題</button>
                    <button id="next-btn" onclick="goNext()" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 ml-auto">下一題</button>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center center-content">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">測驗結果分析</h2>
                <div class="circle-container">
                    <svg class="circle-svg" width="200" height="200">
                        <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
                        <circle id="circle-progress-bar" class="circle-progress" cx="100" cy="100" r="90"></circle>
                    </svg>
                    <div class="circle-text-box">
                        <span id="final-score-text">0%</span>
                        <span class="score-label">總體適配度</span>
                    </div>
                </div>
                
                <div id="result-description" class="p-6 bg-blue-50 border border-blue-100 rounded-lg text-left text-gray-700 leading-relaxed">
                    </div>
                
                <button onclick="location.reload()" class="mt-10 w-full max-w-sm border border-blue-600 text-blue-600 py-3 rounded-lg font-bold hover:bg-blue-50 transition-colors">
                    重新測驗
                </button>
            </div>

        </div> <div class="disclaimer-bar">
            <p class="disclaimer-text">
                ⚠️ 備註說明：本測驗結果僅供個人參考與娛樂用途，建議詳閱各校系簡章並諮詢專業老師。
            </p>
        </div>

    </div>

    <script>
        const quizData = [
            {
                id: 'identity_main',
                question: "1. 請問你目前的身份類別？",
                options: [
                    { text: "體制內學生 (國中/高中職)", value: 'normal', next: 'identity_sub' },
                    { text: "體制外學生 (境外生/實驗教育/自學)", value: 'special', score: 15 }
                ]
            },
            {
                id: 'identity_sub',
                question: "1-1. 請問你目前的就學階段？",
                options: [
                    { text: "高中以下", value: 'junior', score: 2 },
                    { text: "高一", value: 'f1', score: 5 },
                    { text: "高二", value: 'f2', score: 8 },
                    { text: "高三", value: 'f3', score: 10 }
                ]
            },
            {
                id: 'academic_rank',
                question: "2. 你的在校成績百分比 (前 % 數) 大約落在？",
                options: [
                    { text: "前 1% ~ 10%", value: 'top', score: 8 },
                    { text: "11% ~ 30%", value: 'mid-high', score: 5 },
                    { text: "31% ~ 50%", value: 'mid', score: 3 },
                    { text: "50% 之後", value: 'low', score: 1 },
                    { text: "不適用 (如非學校型態實驗教育)", value: 'na', score: 10 }
                ]
            },
            {
                id: 'subject_bias',
                question: "3. 哪些學科是你的「強項」或「偏才領域」？",
                type: 'multiple',
                options: [
                    { text: "國文", value: 'chi', score: 5 },
                    { text: "英文", value: 'eng', score: 5 },
                    { text: "數學", value: 'math', score: 5 },
                    { text: "生物", value: 'bio', score: 5 },
                    { text: "物理", value: 'phy', score: 5 },
                    { text: "化學", value: 'chem', score: 5 },
                    { text: "地科", value: 'geo_sci', score: 5 },
                    { text: "地理", value: 'geo', score: 5 },
                    { text: "歷史", value: 'his', score: 5 },
                    { text: "公民", value: 'civ', score: 5 },
                    { text: "以上皆無明顯偏才 (平均發展)", value: 'none', score: 2 }
                ]
            },
            {
                id: 'special_talent',
                question: "4. 你是否具備以下特殊的「專長」？",
                options: [
                    { text: "具備藝術、體育或特殊領域傑出表現", value: 'art', score: 15 },
                    { text: "對特定冷門領域有超乎常人的熱愛與鑽研", value: 'passion', score: 15 },
                    { text: "具備豐富實務經驗 (如提早創業、長期接案工作)", value: 'practice', score: 18 },
                    { text: "目前尚未發現明顯的特殊專長", value: 'none', score: 0 }
                ]
            },
            {
                id: 'experience',
                question: "5. 你是否擁有以下「過人經歷」？(可複選，此題分數累加)",
                type: 'multiple',
                options: [
                    { text: "學科奧林匹亞競賽 (入選選訓營或獲獎)", value: 'olympiad', score: 20 },
                    { text: "長期深度志工服務或社會公共議題實踐", value: 'volunteer', score: 8 },
                    { text: "具備小論文寫作、全國性競賽獲獎經歷", value: 'award', score: 10 },
                    { text: "具備高階語言證照 (如托福/雅思高分) 或 APCS 證照", value: 'cert', score: 12 },
                    { text: "以上皆無明顯突出經歷", value: 'none', score: 0 }
                ]
            },
            {
                id: 'scenario_1',
                question: "6. 情境題一：當你在研究一個感興趣的題目卻遇到瓶頸時，你通常會？",
                options: [
                    { text: "自行查閱國內外文獻，直到弄懂為止", value: 'a', score: 5 },
                    { text: "先放著，等學校老師教到相關章節再說", value: 'b', score: 1 },
                    { text: "尋找同好或在社群發問，試圖整合資源解決", value: 'c', score: 4 }
                ]
            },
            {
                id: 'scenario_2',
                question: "7. 情境題二：面對學校規定的例行作業，你的看法是？",
                options: [
                    { text: "準時交差，把時間留給自己想做的研究", value: 'a', score: 5 },
                    { text: "完美主義，每一科都要做到最好", value: 'b', score: 2 },
                    { text: "經常覺得無趣，更喜歡自己設定學習進度", value: 'c', score: 4 }
                ]
            },
            {
                id: 'scenario_3',
                question: "8. 情境題三：如果你發現一個很有趣的競賽，但沒人想參加，你會？",
                options: [
                    { text: "就算只有一個人，也會想辦法完成並參賽", value: 'a', score: 5 },
                    { text: "如果老師沒要求，就不會特別去參加", value: 'b', score: 1 },
                    { text: "主動去說服不同專長的朋友跨界組隊", value: 'c', score: 5 }
                ]
            },
            {
                id: 'scenario_4',
                question: "9. 情境題四：對於「失敗」或「落榜」，你的心態通常是？",
                options: [
                    { text: "分析失敗原因，並認為過程累積的經驗更有價值", value: 'a', score: 5 },
                    { text: "會難過很久，覺得自己不如別人", value: 'b', score: 1 },
                    { text: "無所謂，反正人生本來就有許多嘗試", value: 'c', score: 3 }
                ]
            },
            {
                id: 'scenario_5',
                question: "10. 情境題五：你的學習動力主要來自於？",
                options: [
                    { text: "內心的好奇心與對某個領域的狂熱", value: 'a', score: 5 },
                    { text: "家長的期待或對未來找工作的擔憂", value: 'b', score: 1 },
                    { text: "想要證明自己在某個領域是頂尖的", value: 'c', score: 4 }
                ]
            }
        ];

        let currentStep = 0;
        let userAnswers = {};
        let stepHistory = [];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const question = quizData[currentStep];
            const area = document.getElementById('question-area');
            
            let html = `<h2 class="text-xl font-bold text-gray-800 mb-6 text-center md:text-left">${question.question}</h2>`;
            
            if (question.type === 'multiple') {
                html += `<p class="text-sm text-blue-500 mb-4 text-center md:text-left">(此題可多選)</p>`;
                if (question.id === 'subject_bias') {
                    html += `<div class="grid grid-cols-2 gap-2">`;
                }
            }

            question.options.forEach((opt, idx) => {
                const isSelected = isOptionSelected(question.id, opt.value);
                html += `
                    <div class="option-box ${isSelected ? 'selected' : ''}" 
                         onclick="selectOption('${question.id}', '${opt.value}', ${question.type === 'multiple'})">
                        ${opt.text}
                    </div>
                `;
            });

            if (question.type === 'multiple' && question.id === 'subject_bias') {
                html += `</div>`;
            }

            area.innerHTML = html;
            updateUI();
        }

        function isOptionSelected(qId, val) {
            if (!userAnswers[qId]) return false;
            if (Array.isArray(userAnswers[qId])) return userAnswers[qId].includes(val);
            return userAnswers[qId] === val;
        }

        function selectOption(qId, val, isMultiple) {
            if (isMultiple) {
                if (!userAnswers[qId]) userAnswers[qId] = [];
                const index = userAnswers[qId].indexOf(val);
                if (index > -1) {
                    userAnswers[qId].splice(index, 1);
                } else {
                    if (val === 'none') {
                        userAnswers[qId] = ['none'];
                    } else {
                        const noneIndex = userAnswers[qId].indexOf('none');
                        if (noneIndex > -1) userAnswers[qId].splice(noneIndex, 1);
                        userAnswers[qId].push(val);
                    }
                }
            } else {
                userAnswers[qId] = val;
            }
            
            // 重點：選完後立刻重新渲染畫面，這樣 .selected 類別才會套用到 HTML 上
            renderQuestion(); 
        }

        function goNext() {
            const currentQ = quizData[currentStep];
    
            // --- [新增：防呆驗證] ---
            // 檢查 userAnswers 裡是否有目前這題的資料
            const answer = userAnswers[currentQ.id];
            
            // 如果沒選 (null/undefined) 或者 多選題陣列長度為 0
            if (!answer || (Array.isArray(answer) && answer.length === 0)) {
                alert("⚠️ 請先選擇一個選項再繼續喔！");
                return; // 直接中斷函數，不執行後面的切換題目邏輯
            }
            // -----------------------
        
            stepHistory.push(currentStep);
        
            // 邏輯判斷：如果是身分別跳題邏輯
            if (currentQ.id === 'identity_main') {
                if (userAnswers[currentQ.id] === 'special') {
                    currentStep = 2; 
                } else {
                    currentStep++;
                }
            } else {
                currentStep++;
            }
        
            if (currentStep >= quizData.length) {
                showResult();
            } else {
                renderQuestion();
                // --- 新增這行：切換題目後，讓畫面自動平滑捲動回最上方 ---
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function goBack() {
            if (stepHistory.length > 0) {
                currentStep = stepHistory.pop();
                renderQuestion();
            }
        }

        function updateUI() {
            document.getElementById('step-indicator').innerText = `步驟 ${currentStep + 1} / ${quizData.length}`;
            const progress = ((currentStep + 1) / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('percent-indicator').innerText = `${Math.round(progress)}%`;
            
            const prevBtn = document.getElementById('prev-btn');
            if (stepHistory.length > 0) {
                prevBtn.classList.remove('hidden');
            } else {
                prevBtn.classList.add('hidden');
            }

            const nextBtn = document.getElementById('next-btn');
            if (currentStep === quizData.length - 1) {
                nextBtn.innerText = "查看結果";
            } else {
                nextBtn.innerText = "下一題";
            }
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        
            let totalScore = 0;
            
            quizData.forEach(q => {
                const answer = userAnswers[q.id];
                if (!answer) return;
        
                if (q.id === 'subject_bias') {
                    if (answer.includes('none')) {
                        totalScore += 2;
                    } else {
                        const count = answer.length;
                        if (count === 1) totalScore += 15;
                        else if (count === 2) totalScore += 12;
                        else if (count === 3) totalScore += 8;
                        else totalScore += 5;
                    }
                } else if (Array.isArray(answer)) {
                    answer.forEach(val => {
                        const opt = q.options.find(o => o.value === val);
                        if (opt) totalScore += opt.score;
                    });
                } else {
                    const opt = q.options.find(o => o.value === answer);
                    if (opt && opt.score) totalScore += opt.score;
                }
            });
        
            let finalPercent = Math.min(Math.round(totalScore), 100);
        
            // --- 取得 DOM 元件 ---
            const scoreDisplay = document.getElementById('final-score-text');
            const circleBar = document.getElementById('circle-progress-bar');
            const desc = document.getElementById('result-description');
        
            // --- 圓形動畫與數字跳動邏輯 ---
            // 計算圓形周長與偏移量 (半徑 85，周長約 534)
            const circumference = 2 * Math.PI * 85; 
            const offset = circumference - (finalPercent / 100) * circumference;
            
            setTimeout(() => {
                // 1. 執行圓弧進度動畫
                if (circleBar) {
                    circleBar.style.strokeDashoffset = offset;
                }
                
                // 2. 執行數字跑動動畫 (0% -> 目標%)
                let startTime = null;
                const duration = 1500; // 動畫持續 1.5 秒
        
                function updateNumber(currentTime) {
                    if (!startTime) startTime = currentTime;
                    const elapsedTime = currentTime - startTime;
                    const progress = Math.min(elapsedTime / duration, 1);
                    
                    // 計算當前數字
                    const currentCount = Math.floor(progress * finalPercent);
                    scoreDisplay.innerText = `${currentCount}%`;
        
                    if (progress < 1) {
                        requestAnimationFrame(updateNumber);
                    }
                }
                requestAnimationFrame(updateNumber);
            }, 300);
        
            // --- 設定結果描述文字 ---
            let message = "";
            if (finalPercent >= 85) {
                message = "<strong>天選之子：</strong> 你具有極強的個人特色與頂尖背景，特殊選才幾乎是為你量身打造的！你的特定學科強項與經歷在特殊選才中非常具有競爭力。";
            } else if (finalPercent >= 60) {
                message = "<strong>深具潛力：</strong> 你有明確的專長與經歷，適配度良好。雖然可能不是該領域的頂尖大神，但只要能好好敘述你的學習動機與獨特性，錄取機會相當高。";
            } else if (finalPercent >= 40) {
                message = "<strong>邊緣徘徊：</strong> 你的特質介於一般生與特殊生之間。你的學科表現較為平均，缺乏顯著的「偏才」現象。建議加強特定領域的深度，並嘗試累積更具代表性的作品。";
            } else {
                message = "<strong>一般管道更穩：</strong> 根據測驗，你的特質傾向於全面均衡發展，這在一般管道（如個申、分科）是巨大的優勢。特殊選才追求的是「極端偏好」，目前的你更適合在傳統考試中脫穎而出。";
            }
        
            desc.innerHTML = message;
        }
